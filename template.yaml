AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Infraestructura para el datalogger de telemetria del ESP32.
  Despliega un API Gateway HTTP -> Lambda -> DynamoDB + S3.

Parameters:
  DataBucketName:
    Type: String
    Description: Nombre del bucket S3 existente donde se almacenan los datos

Resources:

  # ── Rol de ejecucion de la Lambda ──────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: datalogger-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: telemetria-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub "arn:aws:s3:::${DataBucketName}/*"
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/telemetryDB"

  # ── Funcion Lambda ─────────────────────────────────────────────────────────
  DataloggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: telemetry-datalogger
      Runtime: nodejs22.x
      Handler: src/handler.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          console.log('Loading telemetry-datalogger function');
      Environment:
        Variables:
          BUCKET: !Ref DataBucketName
      Timeout: 10
      MemorySize: 128

  # ── API Gateway HTTP ────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: datalogger-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - https://dqs1fxxxb0c68.cloudfront.net
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DataloggerFunction.Arn
      PayloadFormatVersion: "2.0"

  TelemetriaRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /telemetria"
      Target: !Sub "integrations/${LambdaIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DataloggerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/telemetria"

Outputs:
  ApiUrl:
    Description: URL del endpoint de telemetria
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/telemetria"
